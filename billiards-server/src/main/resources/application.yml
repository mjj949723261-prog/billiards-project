server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/billiards?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  task:
    scheduling:
      pool:
        size: 5

logging:
  level:
    com.billiards.game: DEBUG
    org.springframework.web: INFO

billiards:
  app:
    jwtSecret: ======================BilliardsSecretKeyMustBeVeryLong======================
    jwtExpirationMs: 86400000
